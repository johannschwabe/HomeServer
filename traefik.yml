# traefik.yml (static configuration)
log:
  level: DEBUG
api:
  dashboard: true
  insecure: false
entryPoints:
  web:
    address: ":80"
#    http:
#      redirections:
#        entryPoint:
#          to: websecure
#          scheme: https
  websecure:
    address: ":443"
    transport:
      respondingTimeouts:
        readTimeout: "0s"
  postgres-debug:
    address: ":5432"
  # ADD THIS ENTRYPOINT:
  traefik:
    address: ":8080"
providers:
  swarm:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
certificatesResolvers:
  letsencrypt:
    acme:
      email: johann@schwabe.dev
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true
